# render.yaml
services:
  - type: web
    name: ai-gym-service  # default naming; you can rename in Render UI
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        value: ""
      - key: OPENAI_API_KEY
        value: ""
